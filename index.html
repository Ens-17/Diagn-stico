    "ワイパー-スプラッシュシールド-ジェットパック":"デンタルワイパースミ<br>tips:何をするにもシールドを使おう",

}
function showCalculatedResult(){

showResult(
    answers.type,
    answers.sub,
    answers.sp
    );

}

function showResult(type, sub, sp){
const key = `${type}-${sub}-${sp}`;

document.getElementById("question").innerHTML = "";
document.getElementById("choices").innerHTML = "";

// 完全一致
if(results[key]){

    document.getElementById("result").style.display = "block";
    const resultDiv =
        document.getElementById("result");

    resultDiv.style.display = "block";
    resultDiv.innerHTML = results[key];
        return;
}

// サブスペ一致を探す
const candidates = [];

for(const k in results){

    const parts = k.split("-");

    if(parts[1] === sub && parts[2] === sp){
        candidates.push(results[k]);
    }
}

// サブスペ一致あり
if(candidates.length > 0){

    document.getElementById("result").style.display = "block";
    const resultDiv =
        document.getElementById("result");

    resultDiv.style.display = "block";
    resultDiv.innerHTML =
        "同じサブスペならこんなのがあるよ<br><br>" +
        candidates.join("<br><br>");

}

// サブスペ一致もなし
else{
    document.getElementById("result").style.display = "block";
    const resultDiv =
        document.getElementById("result");

    resultDiv.style.display = "block";
    resultDiv.innerHTML =
        "そんな都合のいい武器はないらしい🧐<br><br>　　　　　😭";

}

}

let current = "q1";

function showQuestion(id){

    const q = data[id];

    const resultDiv =
        document.getElementById("result");

    resultDiv.innerHTML = "";
    resultDiv.style.display = "none";

    document.getElementById("question").innerHTML = q.text;

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    q.choices.forEach(choice => {

        const btn = document.createElement("button");
        btn.textContent = choice.text;

btn.onclick = () => {

    if(q.saveKey){
        answers[q.saveKey] = choice.text;
    }

    if(choice.result === "CALCULATE"){
        showCalculatedResult();
        return;
    }

    if(choice.next){
        showQuestion(choice.next);
        return;
    }

    if(choice.result){
        document.getElementById("question").innerHTML = "";
        document.getElementById("choices").innerHTML = "";

        const resultDiv =
            document.getElementById("result");

        resultDiv.style.display = "block";
        resultDiv.innerHTML = choice.result;
    }

};
        choicesDiv.appendChild(btn);

    });

}

showQuestion(current);

</script>
